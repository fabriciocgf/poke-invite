name: PokeInvite CI/CD Security Pipeline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Etapa 3: Controle de versão com ramificações
on:
  push:
    branches: [ "main", "staging", "development" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  # ==========================================
  # ETAPA 3: INTEGRAÇÃO CONTÍNUA (CI)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compilação (Build Docker)
        run: docker build -t pokeinvite:latest .

      - name: Testes Automatizados
        run: pytest tests/

  # ==========================================
  # ETAPA 4: ANÁLISE ESTÁTICA (SAST)
  # ==========================================
  security-sast:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Bandit
        run: pip install bandit

      - name: Executar Bandit (Análise de Código)
        # Ignora a pasta de testes e venv
        run: bandit -r . -x ./tests,./venv -f html -o bandit-report.html || true

      - name: Salvar Relatório Bandit
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.html

      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'PokeInvite'
          path: '.'
          format: 'HTML'

      - name: Salvar Relatório de Dependências
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  # ==========================================
  # ETAPAS 5 e 6: ENTREGA CONTÍNUA (CD) E DAST
  # ==========================================
  deploy-stage-and-dast:
    runs-on: ubuntu-latest
    needs: security-sast
    environment: staging # Cria o ambiente de aprovação/stage no GitHub
    steps:
      - uses: actions/checkout@v4

      - name: Subir Aplicação em Stage (Docker Compose)
        # Utiliza o docker-compose já existente no seu projeto
        run: docker compose up -d --build

      - name: Aguardar inicialização do servidor
        run: sleep 10

      - name: Executar OWASP ZAP (Análise Dinâmica - DAST)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:5000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a' # Inicia a varredura ativa/quick start

      - name: Parar ambiente de Stage
        if: always()
        run: docker compose down
