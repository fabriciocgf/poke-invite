name: PokeInvite CI/CD Security Pipeline

# Evita os avisos de depreciação do Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main", "staging", "development" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  # ==========================================
  # ETAPA 3: INTEGRAÇÃO CONTÍNUA (CI)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compilação (Build Docker)
        run: docker build -t pokeinvite:latest .

      - name: Testes Automatizados
        run: pytest tests/

  # ==========================================
  # ETAPA 4: ANÁLISE ESTÁTICA (SAST) E DEPENDÊNCIAS
  # ==========================================
  security-sast:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Bandit
        run: pip install bandit

      - name: Executar Bandit (Análise de Código)
        run: bandit -r . -x ./tests,./venv -f html -o bandit-report.html || true

      - name: Salvar Relatório Bandit
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.html

      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true # Impede que o pipeline falhe se a API pública estourar o limite
        with:
          project: 'PokeInvite'
          path: '.'
          format: 'HTML'

      - name: Salvar Relatório de Dependências
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  # ==========================================
  # ETAPAS 5 e 6: ENTREGA CONTÍNUA (CD) E DAST
  # ==========================================
  deploy-stage-and-dast:
    runs-on: ubuntu-latest
    needs: security-sast
    environment: staging
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Criar arquivo .env temporário para CI/CD
        # Usa aspas simples e $$ para o Docker não confundir o hash com variáveis
        run: |
          echo "FLASK_SECRET_KEY=ci-test-key-123" >> .env
          echo 'ADMIN_PASSWORD_HASH=scrypt:32768:8:1$$dummy$$dummy' >> .env
          echo "SMTP_EMAIL=test@test.com" >> .env
          echo "SMTP_PASSWORD=dummy" >> .env

      - name: Subir Aplicação em Stage (Docker Compose)
        run: docker compose up -d --build

      - name: Aguardar inicialização do servidor
        # Espera 15s e tenta conectar na porta 5000 antes de avançar para o ZAP
        run: |
          echo "A aguardar a inicialização do Flask..."
          sleep 15
          curl --retry 5 --retry-delay 5 --retry-connrefused http://localhost:5000

      - name: Executar OWASP ZAP (Análise Dinâmica - DAST)
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:5000'
          cmd_options: '-a'
          fail_action: false # Gera os alertas na aba Security, mas não chumba a pipeline

      - name: Extrair logs do Docker (Em caso de falha)
        if: failure()
        run: docker compose logs

      - name: Parar ambiente de Stage
        if: always()
        run: docker compose down